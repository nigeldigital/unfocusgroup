{% extends "base.html" %}
{% block title %}Leave feedback | The Unfocus Group{% endblock %}

{% block content %}
<div class="mx-auto max-w-xl">
  <h1 class="font-display text-3xl font-semibold text-slate-700">Leave feedback</h1>
  <p class="mt-1 text-slate-500">Say it plainly. Other people will see it.</p>

  {% if error %}
    <p class="mt-4 rounded-lg bg-rose-50 px-4 py-3 text-sm font-medium text-rose-600">{{ error }}</p>
  {% endif %}

  <form action="/submit" method="post" class="mt-6 space-y-7 rounded-2xl bg-white p-8 shadow-sm ring-1 ring-slate-200">
    <div>
      <label for="brand_name" class="block text-sm font-semibold text-slate-700">Which brand or product?</label>
      <input id="brand_name" name="brand_name" type="text" required value="{{ brand }}" placeholder="e.g. Acme Coffee"
        class="mt-2 w-full rounded-lg border border-slate-300 px-4 py-3 text-slate-700 placeholder-slate-300 focus:border-tiffany focus:outline-none focus:ring-2 focus:ring-tiffany/30" />
    </div>

    <div>
      <span class="block text-sm font-semibold text-slate-700">How was it?</span>
      <div id="stars" class="mt-2 flex gap-1" role="radiogroup" aria-label="Rating out of five"></div>
      <input type="hidden" id="rating" name="rating" value="0" required />
    </div>

    <div>
      <label for="feedback_text" class="block text-sm font-semibold text-slate-700">What is the one thing you'd change?</label>
      <textarea id="feedback_text" name="feedback_text" rows="5" required placeholder="Say it plainly."
        class="mt-2 w-full resize-none rounded-lg border border-slate-300 px-4 py-3 text-slate-700 placeholder-slate-300 focus:border-tiffany focus:outline-none focus:ring-2 focus:ring-tiffany/30"></textarea>
    </div>

    <button type="submit" class="w-full rounded-lg bg-tiffany px-6 py-3 font-semibold text-white transition hover:bg-tiffany-dark">Send it</button>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Five-star picker that fills the hidden rating field.
  const starRow = document.getElementById("stars");
  const ratingInput = document.getElementById("rating");
  let pickedRating = Number(ratingInput.value) || 0;

  function paintStars(upTo) {
    [...starRow.children].forEach((star, index) => {
      star.classList.toggle("text-amber-500", index < upTo);
      star.classList.toggle("text-slate-300", index >= upTo);
    });
  }

  for (let i = 1; i <= 5; i++) {
    const star = document.createElement("button");
    star.type = "button";
    star.setAttribute("role", "radio");
    star.setAttribute("aria-label", i + (i > 1 ? " stars" : " star"));
    star.className = "text-3xl text-slate-300 transition hover:scale-110 focus:outline-none";
    star.textContent = "★";
    star.addEventListener("mouseenter", () => paintStars(i));
    star.addEventListener("mouseleave", () => paintStars(pickedRating));
    star.addEventListener("click", () => {
      pickedRating = i;
      ratingInput.value = i;
      paintStars(i);
    });
    starRow.appendChild(star);
  }
  paintStars(pickedRating);
</script>
{% endblock %}
