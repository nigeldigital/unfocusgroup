{% extends "base.html" %}
{% block title %}Log in | The Unfocus Group{% endblock %}

{% block content %}
<div class="mx-auto max-w-sm">
  <h1 class="font-display text-3xl font-semibold text-slate-700">Welcome back</h1>
  <p class="mt-1 text-slate-500">Log in to leave feedback, vote, and reply.</p>

  {% if error %}
    <p class="mt-4 rounded-lg bg-rose-50 px-4 py-3 text-sm font-medium text-rose-600">{{ error }}</p>
  {% endif %}

  <form action="/login" method="post" class="mt-6 space-y-5 rounded-2xl bg-white p-8 shadow-sm ring-1 ring-slate-200">
    <input type="hidden" name="next" value="{{ next }}" />
    <div>
      <label for="username" class="block text-sm font-semibold text-slate-700">Username</label>
      <input id="username" name="username" type="text" required autofocus
        class="mt-2 w-full rounded-lg border border-slate-300 px-4 py-3 text-slate-700 focus:border-tiffany focus:outline-none focus:ring-2 focus:ring-tiffany/30" />
    </div>
    <div>
      <label for="password" class="block text-sm font-semibold text-slate-700">Password</label>
      <input id="password" name="password" type="password" required
        class="mt-2 w-full rounded-lg border border-slate-300 px-4 py-3 text-slate-700 focus:border-tiffany focus:outline-none focus:ring-2 focus:ring-tiffany/30" />
    </div>
    <button type="submit" class="w-full rounded-lg bg-tiffany px-6 py-3 font-semibold text-white transition hover:bg-tiffany-dark">Log in</button>
  </form>

  <p class="mt-4 text-center text-sm text-slate-500">
    New here? <a href="/signup?next={{ next }}" class="font-semibold text-tiffany hover:text-tiffany-dark">Join</a>
  </p>
</div>
{% endblock %}
