<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}The Unfocused Group{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            tiffany: "#0ABAB5",
            "tiffany-dark": "#089a96",
          },
          fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] },
        },
      },
    };
  </script>
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-700 antialiased">

  <!-- Top bar -->
  <nav class="sticky top-0 z-10 border-b border-slate-200 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-3xl items-center justify-between px-5 py-3">
      <a href="/" class="flex items-center gap-2">
        <span class="grid h-7 w-7 place-items-center rounded-lg bg-tiffany text-sm font-bold text-white">U</span>
        <span class="whitespace-nowrap text-base font-bold text-slate-700 sm:text-lg">The Unfocused Group</span>
      </a>
      <div class="flex items-center gap-3 text-sm">
        {% if user %}
          <a href="/submit" class="rounded-lg bg-tiffany px-4 py-2 font-semibold text-white transition hover:bg-tiffany-dark">Leave feedback</a>
          <span class="hidden text-slate-500 sm:inline">{{ user["username"] }}</span>
          <form action="/logout" method="post"><button class="font-medium text-slate-500 hover:text-slate-700">Log out</button></form>
        {% else %}
          <a href="/login" class="font-medium text-slate-500 hover:text-slate-700">Log in</a>
          <a href="/signup" class="rounded-lg bg-tiffany px-4 py-2 font-semibold text-white transition hover:bg-tiffany-dark">Join</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="mx-auto max-w-3xl px-5 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="mx-auto max-w-3xl px-5 py-10 text-center text-sm text-slate-400">
    The Unfocused Group — the anti-focus group. Honest feedback for every brand.
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
